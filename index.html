<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="logo">
        <img src="img/google_logo.jpg" alt="Google!">
    </div>
    
    <div class="box1"> 
        <p>Search the web using Google!</p>
        <input class="search" type="text">
        <br>
        <input type="submit" value="Google Search">
        <input type="submit" value="I'm feeling lucky">
    </div>
    
    <div class="container">

        <div class="box2">
            <p>Special Searches</p>
            <a href="Stanford Search">Stanford Search</a>
            <br>
            <a href="Linux Search">Linux Search</a>
        </div>

        <div class="box3">
            <a href="Help!">Help!</a>
            <br>
            <a href="About Google!">About Google!</a>
            <br>
            <a href="Company Info">Conpany Info</a>
            <br>
            <a href="Google! Logos">Google! Logos</a>
        </div>

        <div class="box4">
            <p>Get Google!</p>
            <p>updates monthly:</p>
            <input type="text" value="your e-mail">
            <br>
            <input type="submit" value="Subscribe">
            <a href="Archive">Archive</a>
        </div>
    </div>
    

    <footer>
        <p>Copyright ©1998 Google Inc.</p>
    </footer>

    
    <!-- Temelde 4 ana yapı var. bunlar: logo alanı, arama alanı, linklerin olduğu alan, footer alanı -->

</body>
</html>
